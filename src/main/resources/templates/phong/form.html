<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Thông tin phòng</h1>
    <div class="card">
        <form method="post" action="/phong/luu" th:object="${item}">
            <div class="form-row">
                <label>Mã phòng</label>
                <input type="number" th:field="*{maPhong}" required>
            </div>
            <div class="form-row">
                <label>Loại phòng</label>
                <select th:field="*{loaiPhong.maLoaiPhong}" required>
                    <option value="">-- Chọn loại phòng --</option>
                    <option th:each="lp : ${loaiPhongs}" th:value="${lp.maLoaiPhong}" th:text="${lp.tenLoaiPhong}"></option>
                </select>
            </div>
            <button class="btn" type="submit">Lưu</button>
            <a class="btn secondary" href="/phong">Quay lại</a>
        </form>
    </div>
</div>
</body>
</html>
