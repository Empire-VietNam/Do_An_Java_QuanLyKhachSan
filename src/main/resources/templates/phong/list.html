<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Quản lý phòng</h1>
    <div class="card">
        <a class="btn" href="/phong/them">+ Thêm phòng</a>
        <table class="table" style="margin-top:14px">
            <thead>
            <tr>
                <th>Mã phòng</th>
                <th>Loại phòng</th>
                <th>Giá phòng</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.maPhong}"></td>
                <td th:text="${item.loaiPhong != null ? item.loaiPhong.tenLoaiPhong : ''}"></td>
                <td th:text="${item.loaiPhong != null ? item.loaiPhong.giaPhong : ''}"></td>
                <td>
                    <a class="btn small secondary" th:href="@{/phong/sua/{id}(id=${item.maPhong})}">Sửa</a>
                    <a class="btn small danger" th:href="@{/phong/xoa/{id}(id=${item.maPhong})}"
                       onclick="return confirm('Xóa phòng này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
