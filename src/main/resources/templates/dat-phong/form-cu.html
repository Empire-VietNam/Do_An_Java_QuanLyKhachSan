<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>📝 ĐẶT PHÒNG MỚI</h1>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <div class="card">
        <!-- Tab chọn khách hàng -->
        <div class="tabs">
            <button type="button" id="tabKhachCu" class="tab active" onclick="showTab('khachCu')">📋 Chọn khách cũ</button>
            <button type="button" id="tabKhachMoi" class="tab" onclick="showTab('khachMoi')">➕ Thêm khách mới</button>
        </div>

        <!-- FORM CHÍNH -->
        <form method="post" action="/dat-phong/luu" th:object="${item}">

            <!-- ========== PHẦN 1: CHỌN KHÁCH CŨ ========== -->
            <div id="khachCuPanel" class="tab-panel active">
                <div class="form-row">
                    <label>🔍 Tìm kiếm khách hàng</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="searchKeyword" placeholder="Nhập tên, CMND hoặc SĐT..." style="flex: 2;">
                        <button type="button" class="btn" onclick="timKhachHang()">Tìm kiếm</button>
                        <button type="button" class="btn secondary" onclick="loadAllKhachHang()">Tất cả</button>
                    </div>
                </div>

                <div class="form-row">
                    <label>📋 Danh sách khách hàng</label>
                    <div style="max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px;">
                        <table class="table" style="margin: 0;">
                            <thead>
                            <tr><th>Mã</th><th>Họ tên</th><th>SĐT</th><th>CMND</th><th>Chọn</th></tr>
                            </thead>
                            <tbody id="khachHangTableBody">
                            <tr th:each="kh : ${khachHangs}">
                                <td th:text="${kh.maKhachHang}">--</td>
                                <td th:text="${kh.hoTen}">--</td>
                                <td th:text="${kh.dienThoai}">--</td>
                                <td th:text="${kh.cmnd}">--</td>
                                <td>
                                    <button type="button" class="btn small"
                                            onclick="chonKhachHang(${kh.maKhachHang}, '${kh.hoTen}')">
                                        ✅ Chọn
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${khachHangs.empty}">
                                <td colspan="5" style="text-align:center">📭 Chưa có khách hàng nào. Hãy thêm mới!</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Hiển thị khách đã chọn -->
                <div class="form-row" id="khachDaChonInfo" style="display: none;">
                    <label>✅ Khách hàng đã chọn:</label>
                    <div style="background: #e8f5e9; padding: 10px; border-radius: 6px;">
                        <strong id="tenKhachChon"></strong>
                        <input type="hidden" th:field="*{khachHang.maKhachHang}" id="maKhachHangInput">
                    </div>
                </div>
            </div>

            <!-- ========== PHẦN 2: THÊM KHÁCH MỚI ========== -->
            <div id="khachMoiPanel" class="tab-panel">
                <div class="form-row">
                    <label>Họ tên <span style="color:red">*</span></label>
                    <input type="text" id="hoTenMoi" placeholder="Nhập họ tên khách hàng">
                </div>
                <div class="form-row">
                    <label>Số điện thoại <span style="color:red">*</span></label>
                    <input type="text" id="dienThoaiMoi" placeholder="Nhập số điện thoại">
                </div>
                <div class="form-row">
                    <label>CMND/CCCD</label>
                    <input type="text" id="cmndMoi" placeholder="Nhập CMND/CCCD">
                </div>
                <div class="form-row">
                    <label>Email</label>
                    <input type="email" id="emailMoi" placeholder="Nhập email">
                </div>
                <div class="form-row">
                    <label>Địa chỉ</label>
                    <input type="text" id="diaChiMoi" placeholder="Nhập địa chỉ">
                </div>
                <div class="form-row">
                    <button type="button" class="btn" onclick="themKhachMoiVaChon()">➕ Thêm khách và chọn</button>
                </div>
            </div>

            <!-- ========== PHẦN 3: THÔNG TIN ĐẶT PHÒNG ========== -->
            <hr style="margin: 20px 0;">
            <h3>🏨 Thông tin đặt phòng</h3>

            <div class="form-row">
                <label>Mã đặt phòng <span style="color:red">*</span></label>
                <input type="number" th:field="*{maCtDatPhong}" placeholder="Ví dụ: 6" required>
                <small class="hint">⚠️ Không được trùng với mã đã có</small>
            </div>

            <div class="form-row">
                <label>Ngày thực hiện</label>
                <input type="date" th:field="*{ngayThucHien}" required>
            </div>

            <div class="form-row">
                <label>Ngày nhận <span style="color:red">*</span></label>
                <input type="date" th:field="*{ngayNhan}" id="ngayNhan" required>
            </div>

            <div class="form-row">
                <label>Ngày trả <span style="color:red">*</span></label>
                <input type="date" th:field="*{ngayTra}" id="ngayTra" required>
                <small class="hint">⚠️ Ngày trả phải lớn hơn ngày nhận</small>
            </div>

            <div class="form-row">
                <label>Phòng <span style="color:red">*</span></label>
                <select th:field="*{phong.maPhong}" required>
                    <option value="">-- Chọn phòng --</option>
                    <option th:each="p : ${phongs}" th:value="${p.maPhong}"
                            th:text="${p.maPhong} + ' - ' + ${p.loaiPhong.tenLoaiPhong} + ' - ' + ${#numbers.formatInteger(p.loaiPhong.giaPhong, 0, 'COMMA')} + ' VNĐ/đêm'"></option>
                </select>
            </div>

            <div class="form-row">
                <label>Nhân viên xử lý</label>
                <select th:field="*{nhanVien.maNhanVien}" required>
                    <option value="">-- Chọn nhân viên --</option>
                    <option th:each="nv : ${nhanViens}" th:value="${nv.maNhanVien}"
                            th:text="${nv.tenNhanVien}"></option>
                </select>
            </div>

            <div class="form-row">
                <label>Trạng thái</label>
                <select th:field="*{trangThai}">
                    <option th:each="tt : ${cacTrangThai}" th:value="${tt.name()}"
                            th:text="${tt.tenHienThi}"></option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" type="submit">💾 Lưu đặt phòng</button>
                <a class="btn secondary" href="/dat-phong">↩️ Quay lại</a>
            </div>
        </form>
    </div>
</div>

<style>
    .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 10px;
    }
    .tab {
        padding: 10px 20px;
        background: #f0f0f0;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }
    .tab.active {
        background: #2196f3;
        color: white;
    }
    .tab-panel {
        display: none;
    }
    .tab-panel.active {
        display: block;
    }
    .form-row {
        margin-bottom: 16px;
    }
    .form-row label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-row input, .form-row select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .hint {
        display: block;
        font-size: 12px;
        color: #666;
        margin-top: 4px;
    }
    .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 16px;
    }
    .alert.error {
        background: #ffebee;
        color: #c62828;
        border-left: 4px solid #c62828;
    }
    .alert.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid #2e7d32;
    }
    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    }
    .btn.small {
        padding: 5px 10px;
        font-size: 12px;
    }
    .table {
        width: 100%;
        border-collapse: collapse;
    }
    .table th, .table td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }
</style>

<script>
    // Dữ liệu khách hàng từ server
    var danhSachKhachHang = /*[[${khachHangs}]]*/ [];

    // Hiển thị tab
    function showTab(tabName) {
        // Ẩn tất cả panel
        document.getElementById('khachCuPanel').classList.remove('active');
        document.getElementById('khachMoiPanel').classList.remove('active');
        // Bỏ active của tất cả tab
        document.getElementById('tabKhachCu').classList.remove('active');
        document.getElementById('tabKhachMoi').classList.remove('active');
        // Hiện panel được chọn
        document.getElementById(tabName + 'Panel').classList.add('active');
        // Active tab được chọn
        document.getElementById('tab' + (tabName === 'khachCu' ? 'KhachCu' : 'KhachMoi')).classList.add('active');
    }

    // Tìm kiếm khách hàng
    function timKhachHang() {
        var keyword = document.getElementById('searchKeyword').value.toLowerCase();
        var filtered = danhSachKhachHang.filter(function(kh) {
            return kh.hoTen.toLowerCase().includes(keyword) ||
                   (kh.cmnd && kh.cmnd.includes(keyword)) ||
                   (kh.dienThoai && kh.dienThoai.includes(keyword));
        });
        renderKhachHangTable(filtered);
    }

    // Tải tất cả khách hàng
    function loadAllKhachHang() {
        document.getElementById('searchKeyword').value = '';
        renderKhachHangTable(danhSachKhachHang);
    }

    // Hiển thị bảng khách hàng
    function renderKhachHangTable(data) {
        var tbody = document.getElementById('khachHangTableBody');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">📭 Không tìm thấy khách hàng nào</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var kh = data[i];
            html += '<tr>' +
                '<td>' + kh.maKhachHang + '</td>' +
                '<td>' + (kh.hoTen || '') + '</td>' +
                '<td>' + (kh.dienThoai || '') + '</td>' +
                '<td>' + (kh.cmnd || '') + '</td>' +
                '<td><button type="button" class="btn small" onclick="chonKhachHang(' + kh.maKhachHang + ', \'' + (kh.hoTen || '').replace(/'/g, "\\'") + '\')">✅ Chọn</button></td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    }

    // Chọn khách hàng
    function chonKhachHang(maKhachHang, tenKhachHang) {
        document.getElementById('maKhachHangInput').value = maKhachHang;
        document.getElementById('tenKhachChon').innerHTML = tenKhachHang + ' (Mã: ' + maKhachHang + ')';
        document.getElementById('khachDaChonInfo').style.display = 'block';
        alert('✅ Đã chọn khách hàng: ' + tenKhachHang);
    }

    // Thêm khách hàng mới và tự động chọn
    function themKhachMoiVaChon() {
        var hoTen = document.getElementById('hoTenMoi').value.trim();
        var dienThoai = document.getElementById('dienThoaiMoi').value.trim();
        var cmnd = document.getElementById('cmndMoi').value.trim();
        var email = document.getElementById('emailMoi').value.trim();
        var diaChi = document.getElementById('diaChiMoi').value.trim();

        if (hoTen === '') {
            alert('❌ Vui lòng nhập họ tên khách hàng!');
            return;
        }
        if (dienThoai === '') {
            alert('❌ Vui lòng nhập số điện thoại!');
            return;
        }

        // Gửi request thêm khách hàng
        fetch('/dat-phong/them-khach-moi-ajax', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                hoTen: hoTen,
                dienThoai: dienThoai,
                cmnd: cmnd,
                email: email,
                diaChi: diaChi
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('✅ Đã thêm khách hàng mới: ' + hoTen);
                // Thêm vào danh sách
                danhSachKhachHang.push(data.khachHang);
                // Chọn khách vừa thêm
                chonKhachHang(data.khachHang.maKhachHang, data.khachHang.hoTen);
                // Chuyển sang tab khách cũ
                showTab('khachCu');
                // Reset form thêm mới
                document.getElementById('hoTenMoi').value = '';
                document.getElementById('dienThoaiMoi').value = '';
                document.getElementById('cmndMoi').value = '';
                document.getElementById('emailMoi').value = '';
                document.getElementById('diaChiMoi').value = '';
                // Cập nhật bảng
                renderKhachHangTable(danhSachKhachHang);
            } else {
                alert('❌ ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ Có lỗi xảy ra, vui lòng thử lại!');
        });
    }

    // Kiểm tra ngày khi submit form
    document.querySelector('form').addEventListener('submit', function(e) {
        var maKhachHang = document.getElementById('maKhachHangInput').value;
        if (!maKhachHang || maKhachHang === '') {
            alert('❌ Vui lòng chọn hoặc thêm khách hàng!');
            e.preventDefault();
            return false;
        }

        var ngayNhan = document.getElementById('ngayNhan').value;
        var ngayTra = document.getElementById('ngayTra').value;

        if (ngayNhan && ngayTra) {
            if (ngayNhan >= ngayTra) {
                alert('❌ Lỗi: Ngày trả phải lớn hơn ngày nhận!');
                e.preventDefault();
                return false;
            }
        }
    });
</script>
</body>
</html>
