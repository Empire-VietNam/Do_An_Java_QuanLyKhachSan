<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Quản lý hóa đơn</h1>
    <div class="card">
        <a class="btn" href="/hoa-don/them">+ Thêm hóa đơn</a>
        <table class="table" style="margin-top:14px">
            <thead>
            <tr>
                <th>Mã HĐ</th>
                <th>Ngày thu tiền</th>
                <th>Số tiền thu</th>
                <th>Mã đặt phòng</th>
                <th>Nhân viên</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.maHoaDon}"></td>
                <td th:text="${item.ngayThuTien}"></td>
                <td th:text="${item.soTienThu}"></td>
                <td th:text="${item.ctDatPhong != null ? item.ctDatPhong.maCtDatPhong : ''}"></td>
                <td th:text="${item.nhanVien != null ? item.nhanVien.tenNhanVien : ''}"></td>
                <td>
                    <a class="btn small secondary" th:href="@{/hoa-don/sua/{id}(id=${item.maHoaDon})}">Sửa</a>
                    <a class="btn small danger" th:href="@{/hoa-don/xoa/{id}(id=${item.maHoaDon})}"
                       onclick="return confirm('Xóa hóa đơn này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
