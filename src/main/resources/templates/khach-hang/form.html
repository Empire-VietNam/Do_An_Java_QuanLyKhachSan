<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>📝 Thông tin đặt phòng</h1>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <div class="card">
        <form method="post" action="/dat-phong/luu" th:object="${item}">

            <div class="form-row">
                <label>Mã đặt phòng</label>
                <input type="number" th:field="*{maCtDatPhong}" required>
            </div>

            <div class="form-row">
                <label>Ngày thực hiện</label>
                <input type="date" th:field="*{ngayThucHien}" required>
            </div>

            <div class="form-row">
                <label>Khách hàng</label>
                <select th:field="*{khachHang.maKhachHang}" required>
                    <option value="">-- Chọn khách hàng --</option>
                    <option th:each="kh : ${khachHangs}" th:value="${kh.maKhachHang}"
                            th:text="${kh.hoTen}"></option>
                </select>
                <a class="btn small" href="/khach-hang/them" target="_blank" style="margin-top: 5px;">➕ Thêm khách mới</a>
            </div>

            <div class="form-row">
                <label>Ngày nhận</label>
                <input type="date" th:field="*{ngayNhan}" required>
            </div>

            <div class="form-row">
                <label>Ngày trả</label>
                <input type="date" th:field="*{ngayTra}" required>
            </div>

            <div class="form-row">
                <label>Phòng</label>
                <select th:field="*{phong.maPhong}" required>
                    <option value="">-- Chọn phòng --</option>
                    <option th:each="p : ${phongs}" th:value="${p.maPhong}"
                            th:text="${p.maPhong}"></option>
                </select>
            </div>

            <div class="form-row">
                <label>Nhân viên</label>
                <select th:field="*{nhanVien.maNhanVien}" required>
                    <option value="">-- Chọn nhân viên --</option>
                    <option th:each="nv : ${nhanViens}" th:value="${nv.maNhanVien}"
                            th:text="${nv.tenNhanVien}"></option>
                </select>
            </div>

            <button class="btn" type="submit">💾 Lưu</button>
            <a class="btn secondary" href="/dat-phong">↩️ Quay lại</a>
        </form>
    </div>
</div>

<style>
    .form-row {
        margin-bottom: 16px;
    }
    .form-row label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-row input, .form-row select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 16px;
    }
    .alert.error {
        background: #ffebee;
        color: #c62828;
        border-left: 4px solid #c62828;
    }
    .alert.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid #2e7d32;
    }
    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    }
    .btn.small {
        padding: 5px 10px;
        font-size: 12px;
        background: #2196f3;
        color: white;
    }
</style>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        var ngayNhan = document.querySelector('[name="ngayNhan"]').value;
        var ngayTra = document.querySelector('[name="ngayTra"]').value;

        if (ngayNhan && ngayTra && ngayNhan >= ngayTra) {
            alert('❌ Ngày trả phải lớn hơn ngày nhận!');
            e.preventDefault();
        }
    });
</script>
</body>
</html>
