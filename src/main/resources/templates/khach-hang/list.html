<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Quản lý khách hàng</h1>
    <div class="card">
        <div class="actions" style="justify-content:space-between">
            <form class="search" method="get" action="/khach-hang">
                <input type="text" name="keyword" placeholder="Tìm theo tên khách hàng" th:value="${keyword}">
                <button class="btn" type="submit">Tìm</button>
            </form>
            <a class="btn" href="/khach-hang/them">+ Thêm khách hàng</a>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Địa chỉ</th>
                <th>Điện thoại</th>
                <th>CMND</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.maKhachHang}"></td>
                <td th:text="${item.hoTen}"></td>
                <td th:text="${item.email}"></td>
                <td th:text="${item.diaChi}"></td>
                <td th:text="${item.dienThoai}"></td>
                <td th:text="${item.cmnd}"></td>
                <td>
                    <a class="btn small secondary" th:href="@{/khach-hang/sua/{id}(id=${item.maKhachHang})}">Sửa</a>
                    <a class="btn small danger" th:href="@{/khach-hang/xoa/{id}(id=${item.maKhachHang})}"
                       onclick="return confirm('Xóa khách hàng này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
