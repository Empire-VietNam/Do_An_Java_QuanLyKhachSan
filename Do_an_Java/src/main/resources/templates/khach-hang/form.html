<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Thông tin khách hàng</h1>
    <div class="card">
        <form method="post" action="/khach-hang/luu" th:object="${item}">
            <div class="form-row">
                <label>Mã khách hàng</label>
                <input type="number" th:field="*{maKhachHang}" required>
            </div>
            <div class="form-row">
                <label>Họ tên</label>
                <input type="text" th:field="*{hoTen}" required>
            </div>
            <div class="form-row">
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>
            <div class="form-row">
                <label>Địa chỉ</label>
                <input type="text" th:field="*{diaChi}">
            </div>
            <div class="form-row">
                <label>Điện thoại</label>
                <input type="text" th:field="*{dienThoai}">
            </div>
            <div class="form-row">
                <label>CMND</label>
                <input type="text" th:field="*{cmnd}">
            </div>
            <button class="btn" type="submit">Lưu</button>
            <a class="btn secondary" href="/khach-hang">Quay lại</a>
        </form>
    </div>
</div>
</body>
</html>
