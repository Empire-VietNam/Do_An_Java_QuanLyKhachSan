<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loại phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

    <h1>Quản lý loại phòng</h1>
    <div class="card">
        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert success" th:if="${success}" th:text="${success}"></div>

        <a class="btn" href="/loai-phong/them">+ Thêm loại phòng</a>
        <table class="table" style="margin-top:14px">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Tên loại</th>
                <th>Giá phòng</th>
                <th>Mô tả</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td><span class="code-badge" th:text="${item.maLoaiPhong}"></span></td>
                <td th:text="${item.tenLoaiPhong}"></td>
                <td class="price-cell" th:text="${item.giaPhong != null ? #numbers.formatInteger(item.giaPhong, 0, 'POINT') + ' VND' : ''}"></td>
                <td th:text="${item.moTa}"></td>
                <td>
                    <a class="btn small secondary" th:href="@{/loai-phong/sua/{id}(id=${item.maLoaiPhong})}">Sửa</a>
                    <a class="btn small danger" th:href="@{/loai-phong/xoa/{id}(id=${item.maLoaiPhong})}"
                       onclick="return confirm('Xóa loại phòng này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:replace="~{fragments/pagination :: pagination}"></div>
    </div>
</div>
</body>
</html>
